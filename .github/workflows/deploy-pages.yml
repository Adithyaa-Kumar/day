name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static Pages site
        shell: bash
        run: |
          set -e
          mkdir -p _site/static/css _site/static/js _site/image
          cp -r image/. _site/image/
          cp -r static/. _site/static/
          cp index.html _site/

          python - <<'PY'
          from pathlib import Path

          site = Path('_site')
          
          js_path = site / 'static' / 'js' / 'script.js'
          js = js_path.read_text(encoding='utf-8')
          js = js.replace("'/image/", "'image/").replace('"/image/', '"image/')
          js_path.write_text(js, encoding='utf-8')

          css_path = site / 'static' / 'css' / 'style.css'
          css = css_path.read_text(encoding='utf-8')
          css = css.replace("url('/image/", "url('../../image/")
          css = css.replace('url("/image/', 'url("../../image/')
          css_path.write_text(css, encoding='utf-8')

          (site / '.nojekyll').write_text('', encoding='utf-8')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Cake</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #scene {
    position: relative;
    width: 440px;
    height: 500px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  #cake {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .tier {
    position: relative;
    opacity: 0;
    transform: translateY(36px) scale(.88);
    transition: opacity .75s ease, transform .75s cubic-bezier(.22,1,.36,1);
  }

  .tier.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .tier-body {
    position: relative;
    border-radius: 18px;
    border: 1px solid rgba(220, 238, 255, 0.58);
    overflow: visible;
    margin: 0 auto;
  }

  #t1 .tier-body {
    width: 260px;
    height: 72px;
    background: linear-gradient(180deg, #4f8ec8 0%, #326aa5 58%, #244f83 100%);
    box-shadow: inset 0 -12px 16px rgba(2, 17, 54, 0.38), 0 16px 48px rgba(5,16,60,.7);
  }

  #t2 {
    margin-bottom: -4px;
  }

  #t2 .tier-body {
    width: 196px;
    height: 60px;
    background: linear-gradient(180deg, #8cc5f3 0%, #5ea1d8 55%, #4b89bf 100%);
    box-shadow: inset 0 -10px 16px rgba(3, 24, 70, 0.28), 0 12px 36px rgba(5,20,70,.6);
    transition-delay: .55s;
  }

  #t3 {
    margin-bottom: -4px;
  }

  #t3 .tier-body {
    width: 128px;
    height: 50px;
    background: linear-gradient(180deg, #cce8ff 0%, #9ed3fa 52%, #79b7e8 100%);
    box-shadow: inset 0 -8px 16px rgba(4, 31, 82, 0.22), 0 8px 28px rgba(10,25,80,.55);
    transition-delay: 1.1s;
  }

  .frosting {
    position: absolute;
    left: -3px;
    right: -3px;
    top: -14px;
    height: 20px;
    overflow: hidden;
    pointer-events: none;
    opacity: 0;
    transform: scaleX(.8);
    transition: opacity .5s ease, transform .5s ease;
  }

  .tier.show .frosting {
    opacity: 1;
    transform: scaleX(1);
  }

  .frosting svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .drips {
    position: absolute;
    top: 5px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
    padding: 0 10px;
    pointer-events: none;
  }

  .drip {
    width: 9px;
    background: linear-gradient(180deg, #c8dcff 0%, #7aacff 60%, rgba(100,160,255,0) 100%);
    border-radius: 0 0 6px 6px;
    transform-origin: top center;
    transform: scaleY(0);
    transition: transform .6s cubic-bezier(.22,1,.36,1);
  }

  .tier.show .drip {
    transform: scaleY(1);
  }

  .pearls {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
  }

  .pearl {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #e0edff, #7aaeff);
    box-shadow: 0 0 6px rgba(147,197,253,.6);
    opacity: 0;
    transition: opacity .4s ease;
  }

  .tier.show .pearl {
    opacity: 1;
  }

  .glitter {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: inherit;
    overflow: hidden;
  }

  .glitter span {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(200,220,255,.7);
    animation: glitterBlink 2s ease-in-out infinite alternate;
  }

  @keyframes glitterBlink {
    0% {
      opacity: .1;
    }
    100% {
      opacity: .9;
    }
  }

  .lace {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 12px;
    pointer-events: none;
  }

  .lace svg {
    width: 100%;
    height: 100%;
  }

  #candle-row {
    position: absolute;
    bottom: calc(100% - 6px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    pointer-events: none;
  }

  .cdl {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity .5s ease, transform .55s cubic-bezier(.22,1,.36,1);
  }

  .cdl.show {
    opacity: 1;
    transform: translateY(0);
  }

  .cdl-body {
    width: 13px;
    height: 42px;
    border-radius: 4px 4px 3px 3px;
    position: relative;
    box-shadow: inset 2px 0 0 rgba(255,255,255,.18), inset -1px 0 0 rgba(0,0,0,.2);
  }

  .cdl-body::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 2px;
    right: 2px;
    height: 35%;
    border-radius: 3px 3px 0 0;
    background: rgba(255,255,255,.12);
  }

  .cdl-stripe {
    position: absolute;
    left: 0;
    right: 0;
    height: 5px;
    background: rgba(255,255,255,.14);
  }

  .cdl-wick {
    width: 2px;
    height: 8px;
    background: linear-gradient(180deg, #d4a040 0%, #5a3a10 100%);
    border-radius: 1px;
    position: relative;
    z-index: 2;
  }

  .flame-wrap {
    position: relative;
    width: 26px;
    height: 36px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    transition: opacity .35s ease;
  }

  .flame-wrap.lit {
    opacity: 1;
  }

  .flame-wrap.blown {
    opacity: 0 !important;
  }

  .flame-outer {
    position: absolute;
    bottom: 0;
    width: 18px;
    height: 28px;
    background: radial-gradient(ellipse at 50% 85%, #fff7d6 0%, #fde68a 18%, #f59e0b 42%, #dc7519 64%, transparent 82%);
    border-radius: 50% 50% 38% 38%;
    transform-origin: 50% 100%;
    animation: flameOuter .65s ease-in-out infinite alternate;
    filter: blur(.3px);
  }

  .flame-inner {
    position: absolute;
    bottom: 2px;
    width: 9px;
    height: 16px;
    background: radial-gradient(ellipse at 50% 90%, #fff 0%, #fde68a 35%, #f59e0b 70%, transparent 90%);
    border-radius: 50% 50% 40% 40%;
    transform-origin: 50% 100%;
    animation: flameInner .55s ease-in-out infinite alternate;
  }

  .flame-glow {
    position: absolute;
    bottom: -4px;
    width: 28px;
    height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,.45) 0%, transparent 70%);
    animation: glowPulse .7s ease-in-out infinite alternate;
    filter: blur(3px);
  }

  @keyframes flameOuter {
    0%   { transform: scaleX(1) scaleY(1) skewX(-2deg); }
    33%  { transform: scaleX(.92) scaleY(1.07) skewX(2deg); }
    66%  { transform: scaleX(1.05) scaleY(.96) skewX(-1deg); }
    100% { transform: scaleX(.96) scaleY(1.04) skewX(1.5deg); }
  }

  @keyframes flameInner {
    0%   { transform: scaleX(1) scaleY(1) rotate(-1deg); }
    50%  { transform: scaleX(.88) scaleY(1.1) rotate(2deg); }
    100% { transform: scaleX(1.1) scaleY(.92) rotate(-2deg); }
  }

  @keyframes glowPulse {
    from {
      opacity: .6;
      transform: scale(.9);
    }
    to {
      opacity: 1;
      transform: scale(1.15);
    }
  }

  .smoke {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    width: 30px;
  }

  .smoke-puff {
    position: absolute;
    border-radius: 50%;
    background: rgba(200,216,255,.45);
    animation: smokeDrift ease-out forwards;
  }

  @keyframes smokeDrift {
    0% {
      opacity: .7;
      transform: translateX(0) translateY(0) scale(.3);
    }
    40% {
      opacity: .5;
    }
    100% {
      opacity: 0;
      transform: translateX(var(--dx)) translateY(-70px) scale(2.2);
    }
  }
</style>
</head>
<body>
  <div id="scene">
    <div id="cake">
      <div class="tier" id="t3">
        <div class="tier-body">
          <div class="glitter" id="g3"></div>
          <div class="frosting">
            <svg viewBox="0 0 134 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0,20 C10,4 20,16 30,4 C40,16 50,4 60,16 C70,4 80,16 90,4 C100,16 110,4 120,16 C127,8 134,14 134,20 Z" fill="#dbeafe" />
            </svg>
          </div>
          <div class="drips">
            <div class="drip" style="height:10px;transition-delay:.1s"></div>
            <div class="drip" style="height:16px;transition-delay:.2s"></div>
            <div class="drip" style="height:12px;transition-delay:.15s"></div>
            <div class="drip" style="height:9px;transition-delay:.25s"></div>
            <div class="drip" style="height:14px;transition-delay:.1s"></div>
          </div>
          <div class="pearls">
            <div class="pearl" style="transition-delay:.2s"></div>
            <div class="pearl" style="transition-delay:.3s"></div>
            <div class="pearl" style="transition-delay:.25s"></div>
            <div class="pearl" style="width:5px;height:5px;transition-delay:.35s"></div>
          </div>
          <div class="lace">
            <svg viewBox="0 0 128 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0,0 Q8,12 16,0 Q24,12 32,0 Q40,12 48,0 Q56,12 64,0 Q72,12 80,0 Q88,12 96,0 Q104,12 112,0 Q120,12 128,0" fill="none" stroke="rgba(147,197,253,.3)" stroke-width="1.5"/>
            </svg>
          </div>
          <div id="candle-row">
            <div class="cdl" id="cd1">
              <div class="flame-wrap" id="fl1"><div class="flame-glow"></div><div class="flame-outer"></div><div class="flame-inner"></div></div>
              <div class="cdl-wick"></div>
              <div class="cdl-body" style="background:linear-gradient(180deg,#6ee7f7,#22b5cc);"><div class="cdl-stripe" style="top:8px;"></div><div class="cdl-stripe" style="top:20px;"></div><div class="cdl-stripe" style="top:32px;"></div></div>
            </div>
            <div class="cdl" id="cd2">
              <div class="flame-wrap" id="fl2"><div class="flame-glow"></div><div class="flame-outer"></div><div class="flame-inner"></div></div>
              <div class="cdl-wick"></div>
              <div class="cdl-body" style="background:linear-gradient(180deg,#c4b5fd,#7c3aed);"><div class="cdl-stripe" style="top:8px;"></div><div class="cdl-stripe" style="top:20px;"></div><div class="cdl-stripe" style="top:32px;"></div></div>
            </div>
            <div class="cdl" id="cd3">
              <div class="flame-wrap" id="fl3"><div class="flame-glow"></div><div class="flame-outer"></div><div class="flame-inner"></div></div>
              <div class="cdl-wick"></div>
              <div class="cdl-body" style="background:linear-gradient(180deg,#fbcfe8,#ec4899);"><div class="cdl-stripe" style="top:8px;"></div><div class="cdl-stripe" style="top:20px;"></div><div class="cdl-stripe" style="top:32px;"></div></div>
            </div>
          </div>
        </div>
      </div>

      <div class="tier" id="t2">
        <div class="tier-body">
          <div class="glitter" id="g2"></div>
          <div class="frosting">
            <svg viewBox="0 0 202 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0,20 C12,4 24,16 36,4 C48,16 60,4 72,16 C84,4 96,16 108,4 C120,16 132,4 144,16 C156,4 168,16 180,4 C190,14 202,8 202,20 Z" fill="#dbeafe" />
            </svg>
          </div>
          <div class="drips">
            <div class="drip" style="height:12px;transition-delay:.1s"></div>
            <div class="drip" style="height:18px;transition-delay:.18s"></div>
            <div class="drip" style="height:10px;transition-delay:.12s"></div>
            <div class="drip" style="height:20px;transition-delay:.08s"></div>
            <div class="drip" style="height:14px;transition-delay:.2s"></div>
            <div class="drip" style="height:16px;transition-delay:.15s"></div>
          </div>
          <div class="pearls">
            <div class="pearl" style="transition-delay:.1s"></div>
            <div class="pearl" style="transition-delay:.18s"></div>
            <div class="pearl" style="transition-delay:.14s"></div>
            <div class="pearl" style="transition-delay:.22s"></div>
            <div class="pearl" style="width:5px;height:5px;transition-delay:.1s"></div>
            <div class="pearl" style="transition-delay:.2s"></div>
          </div>
          <div class="lace">
            <svg viewBox="0 0 196 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0,0 Q8,12 16,0 Q24,12 32,0 Q40,12 48,0 Q56,12 64,0 Q72,12 80,0 Q88,12 96,0 Q104,12 112,0 Q120,12 128,0 Q136,12 144,0 Q152,12 160,0 Q168,12 176,0 Q184,12 196,0" fill="none" stroke="rgba(147,197,253,.3)" stroke-width="1.5"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="tier" id="t1">
        <div class="tier-body">
          <div class="glitter" id="g1"></div>
          <div class="frosting">
            <svg viewBox="0 0 266 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0,20 C14,4 28,16 42,4 C56,16 70,4 84,16 C98,4 112,16 126,4 C140,16 154,4 168,16 C182,4 196,16 210,4 C224,16 238,4 252,16 C258,8 266,14 266,20 Z" fill="#dbeafe" />
            </svg>
          </div>
          <div class="drips">
            <div class="drip" style="height:14px;transition-delay:.05s"></div>
            <div class="drip" style="height:20px;transition-delay:.12s"></div>
            <div class="drip" style="height:11px;transition-delay:.08s"></div>
            <div class="drip" style="height:22px;transition-delay:.15s"></div>
            <div class="drip" style="height:16px;transition-delay:.1s"></div>
            <div class="drip" style="height:18px;transition-delay:.06s"></div>
            <div class="drip" style="height:12px;transition-delay:.14s"></div>
          </div>
          <div class="pearls">
            <div class="pearl" style="transition-delay:.05s"></div>
            <div class="pearl" style="transition-delay:.1s"></div>
            <div class="pearl" style="transition-delay:.08s"></div>
            <div class="pearl" style="transition-delay:.15s"></div>
            <div class="pearl" style="width:5px;height:5px;transition-delay:.12s"></div>
            <div class="pearl" style="transition-delay:.06s"></div>
            <div class="pearl" style="transition-delay:.1s"></div>
            <div class="pearl" style="width:5px;height:5px;transition-delay:.14s"></div>
          </div>
          <div class="lace">
            <svg viewBox="0 0 260 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0,0 Q8,12 16,0 Q24,12 32,0 Q40,12 48,0 Q56,12 64,0 Q72,12 80,0 Q88,12 96,0 Q104,12 112,0 Q120,12 128,0 Q136,12 144,0 Q152,12 160,0 Q168,12 176,0 Q184,12 192,0 Q200,12 208,0 Q216,12 224,0 Q232,12 240,0 Q248,12 260,0" fill="none" stroke="rgba(147,197,253,.3)" stroke-width="1.5"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    const layers = [document.getElementById('t1'), document.getElementById('t2'), document.getElementById('t3')];
    const candles = [document.getElementById('cd1'), document.getElementById('cd2'), document.getElementById('cd3')];
    const flames = [document.getElementById('fl1'), document.getElementById('fl2'), document.getElementById('fl3')];
    const cake = document.getElementById('cake');
    let activeToken = 0;

    function resetCake() {
      cake.classList.remove('blown');
      layers.forEach((layer) => layer.classList.remove('show'));
      candles.forEach((candle) => candle.classList.remove('show'));
      flames.forEach((flame) => {
        flame.classList.remove('lit');
        flame.classList.remove('blown');
      });
    }

    function startCake() {
      activeToken += 1;
      const token = activeToken;
      resetCake();

      setTimeout(() => {
        if (token !== activeToken) return;
        layers[0].classList.add('show');
      }, 250);

      setTimeout(() => {
        if (token !== activeToken) return;
        layers[1].classList.add('show');
      }, 1150);

      setTimeout(() => {
        if (token !== activeToken) return;
        layers[2].classList.add('show');
      }, 1950);

      setTimeout(() => {
        if (token !== activeToken) return;
        candles.forEach((candle, index) => {
          setTimeout(() => candle.classList.add('show'), index * 180);
          setTimeout(() => flames[index].classList.add('lit'), index * 180 + 220);
        });
      }, 2750);
    }

    function spawnSmoke(flameWrap) {
      for (let p = 0; p < 6; p++) {
        setTimeout(() => {
          const sm = document.createElement('div');
          sm.className = 'smoke-puff';
          const sz = 6 + Math.random() * 12;
          const dx = (Math.random() - 0.5) * 20;
          sm.style.cssText = `width:${sz}px;height:${sz}px;left:${8 + Math.random() * 10}px;bottom:0;--dx:${dx}px;animation-duration:${1.4 + Math.random() * 0.8}s;animation-delay:0s;`;
          const sw = flameWrap.querySelector('.smoke') || (() => {
            const s = document.createElement('div');
            s.className = 'smoke';
            flameWrap.appendChild(s);
            return s;
          })();
          sw.appendChild(sm);
          setTimeout(() => sm.remove(), 2300);
        }, p * 160);
      }
    }

    function blowCandles() {
      cake.classList.add('blown');
      flames.forEach((flame, index) => {
        setTimeout(() => {
          const flameWrap = flame.closest('.flame-wrap');
          flameWrap.classList.add('blown');
          spawnSmoke(flameWrap);
        }, index * 130);
      });

      setTimeout(() => {
        window.parent.postMessage({ type: 'cake-finished' }, '*');
      }, 3000);
    }

    window.addEventListener('message', (event) => {
      const message = event.data || {};
      if (message.type === 'start-cake') {
        startCake();
      }
      if (message.type === 'blow-cake') {
        blowCandles();
      }
    });

    window.addEventListener('load', startCake);
  })();
  </script>
</body>
</html>
